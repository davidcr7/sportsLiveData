<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>直播吧赛事悬浮窗</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@500;600;700&family=Barlow+Condensed:wght@600;700&family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <div class="ambient-glow" aria-hidden="true"></div>

      <header class="topbar">
        <div class="brand">
          <div class="brand__icon" aria-hidden="true">
            <span class="brand__play"></span>
          </div>
          <div>
            <h1>直播吧赛程</h1>
            <p>
              <span class="live-dot"></span>
              <span class="live-feed-label">LIVE FEED</span>
              <span class="live-feed-sub">实时直播</span>
            </p>
          </div>
        </div>
        <button id="refreshButton" class="icon-button" type="button" aria-label="刷新赛事" title="刷新赛事">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 12a9 9 0 1 1-2.64-6.36" />
            <path d="M21 3v6h-6" />
          </svg>
        </button>
      </header>

      <section class="category-bar">
        <nav id="categoryTabs" class="category-tabs" aria-label="赛事分类"></nav>
        <button
          id="pinTabButton"
          class="pin-button"
          type="button"
          aria-label="固定当前分类"
          title="固定当前分类"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M12 3.5l2.47 5.18 5.53.62-4.1 3.86 1.13 5.6L12 15.9l-5.03 2.86 1.13-5.6-4.1-3.86 5.53-.62L12 3.5Z"
              fill="currentcolor"
            />
          </svg>
        </button>
        <div id="filterPanel" class="filter-panel" role="dialog" aria-label="按联赛或球队筛选" hidden></div>
      </section>

      <nav id="dateTabs" class="date-tabs" aria-label="赛事日期" hidden></nav>

      <section id="content" class="content" aria-live="polite">
        <div class="loading-state" role="status">
          <div class="spinner"></div>
          <p>正在获取足球赛事…</p>
        </div>
      </section>

      <footer class="footer">
        <span id="updateStatus">正在连接直播吧</span>
        <a href="https://www.zhibo8.com/" target="_blank" rel="noreferrer">
          打开直播吧
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 12h14M13 6l6 6-6 6" />
          </svg>
        </a>
      </footer>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
